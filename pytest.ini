[pytest]
# ---------------------------------------------------------------------------
# Warning filters
# ---------------------------------------------------------------------------
# These filters are applied by pytest BEFORE any test module is imported,
# which is the only way to suppress warnings that fire at import time. An
# in-test `warnings.filterwarnings(...)` call runs too late — by then the
# warning has already been raised and cached in __warningregistry__, and
# the filter has nothing left to suppress.
#
# Syntax: action:message_regex:category:module:line
# (see `python -W help` for the full grammar — pytest forwards these to
#  Python's warnings machinery at session start.)
#
# Silenced:
#   - SWIG-generated types (SwigPyPacked, SwigPyObject, swigvarlink) that
#     back `faiss._swigfaiss`. Python 3.14 warns when a builtin type lacks
#     __module__, which SWIG-generated types don't set. Upstream fix is
#     tracked in the SWIG project; until then the warnings are pure noise.
#     See: https://github.com/facebookresearch/faiss/issues (multiple)
filterwarnings =
    ignore:builtin type SwigPy.* has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
